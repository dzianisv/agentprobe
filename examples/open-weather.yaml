name: open-weather
url: https://wttr.in/New+York
goal: Navigate to wttr.in and find today's temperature for New York
successCriteria:
  - A temperature value is visible on screen
  - The city name or weather location is visible
failureCriteria:
  - Page fails to load after 30 seconds
  - An error message is visible
verification:
  prompt: "Does this screenshot show a weather page with at least one temperature value visible? Answer YES or NO, then one sentence of evidence."
maxSteps: 10
