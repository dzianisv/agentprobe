name: nws-weather
url: https://forecast.weather.gov/MapClick.php?CityName=New+York&state=NY&site=OKX
goal: Navigate to the National Weather Service forecast page for New York and confirm a temperature value is visible
defaultWaitMs: 3000
maxSteps: 10
successCriteria:
  - A temperature value (°F) is visible on screen
  - A location heading or city name for New York is visible
failureCriteria:
  - Page fails to load or shows a server error after waiting
verification:
  prompt: "Does this screenshot show a National Weather Service forecast page with at least one temperature value visible? Answer YES or NO, then one sentence of evidence."
