name: Lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyflakes
      - run: python -m pyflakes agentprobe/
      - run: python -c "import ast, pathlib; [ast.parse(f.read_text()) for f in pathlib.Path('agentprobe').rglob('*.py')]"
