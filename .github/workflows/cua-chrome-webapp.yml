name: CUA - Chrome Web App (vibebrowser.app)

# Daily smoke test of the vibebrowser.app landing page.
# Also runs on any change to the webapp test case or browser runner.

on:
  push:
    paths:
      - 'examples/vibebrowser/vibebrowser-webapp.yaml'
      - 'browser/**'
      - '.github/workflows/cua-chrome-webapp.yml'
  pull_request:
    paths:
      - 'examples/vibebrowser/vibebrowser-webapp.yaml'
      - 'browser/**'
      - '.github/workflows/cua-chrome-webapp.yml'
  schedule:
    - cron: '0 8 * * *'   # daily at 08:00 UTC — monitors live site health
  workflow_dispatch:

jobs:
  cua-webapp:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agentprobe
        run: pip install -e .

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install browser runner deps
        run: cd browser && bun install

      - name: Install system deps (Xvfb, xdotool, scrot, Chrome)
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool scrot ffmpeg
          google-chrome --version

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run vibebrowser.app smoke test
        env:
          AZURE_CUA_API_KEY: ${{ secrets.AZURE_CUA_API_KEY }}
          AZURE_CUA_BASE_URL: ${{ secrets.AZURE_CUA_BASE_URL }}
          CUA_MODEL: gpt-5.4
          DISPLAY: ":99"
        run: |
          agentprobe run \
            --target browser \
            --case examples/vibebrowser/vibebrowser-webapp.yaml \
            --output-dir /tmp/cua-webapp-output

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cua-webapp-output-${{ github.run_number }}
          path: /tmp/cua-webapp-output/
          retention-days: 14
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cua-webapp-output-demo-${{ github.run_number }}
          path: |
            /tmp/cua-webapp-output/demo.gif
            /tmp/cua-webapp-output/recording.mp4
          retention-days: 30
          if-no-files-found: warn
