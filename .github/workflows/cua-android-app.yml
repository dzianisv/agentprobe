name: CUA - Android App (opencode)

on:
  push:
    paths:
      - 'examples/android/**'
      - 'agentprobe/**'
      - '.github/workflows/cua-android-app.yml'
  pull_request:
    paths:
      - 'examples/android/**'
      - 'agentprobe/**'
      - '.github/workflows/cua-android-app.yml'
  workflow_dispatch:

jobs:
  cua-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agentprobe
        run: pip install -e .

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Download opencode APK from F-Droid repo
        # Fetches the latest APK from the custom F-Droid repo index.
        # The repo is single-app so we take the first package found.
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, sys
          repo = "https://dzianisv.github.io/opencode-mobile/fdroid/repo"
          try:
              with urllib.request.urlopen(f"{repo}/index-v1.json", timeout=30) as r:
                  idx = json.load(r)
          except Exception as e:
              print(f"Failed to fetch F-Droid index: {e}", file=sys.stderr)
              sys.exit(1)
          packages = idx.get("packages", {})
          if not packages:
              print("No packages found in F-Droid index", file=sys.stderr)
              sys.exit(1)
          for pkg_id, versions in packages.items():
              if versions:
                  apk = versions[0]["apkName"]
                  url = f"{repo}/{apk}"
                  print(f"Downloading {pkg_id} from {url}")
                  urllib.request.urlretrieve(url, "opencode.apk")
                  print("Download complete")
                  break
          PYEOF

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run opencode CUA smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            adb install -r opencode.apk
            agentprobe run --target android --case examples/android/opencode-smoke.yaml --output-dir /tmp/cua-android-output
        env:
          AZURE_CUA_API_KEY: ${{ secrets.AZURE_CUA_API_KEY }}
          AZURE_CUA_BASE_URL: ${{ secrets.AZURE_CUA_BASE_URL }}
          AZURE_CUA_MODEL: gpt-5.4

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cua-android-output-${{ github.run_number }}
          path: /tmp/cua-android-output/
          retention-days: 14
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cua-android-output-demo-${{ github.run_number }}
          path: |
            /tmp/cua-android-output/demo.gif
            /tmp/cua-android-output/opencode-smoke.mp4
          retention-days: 30
          if-no-files-found: warn
