name: Browser CUA

on: [push, pull_request]

jobs:
  browser-cua:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install agentprobe
        run: pip install -e .

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install browser runner deps
        run: cd browser && bun install

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb xdotool scrot ffmpeg
          google-chrome --version

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run browser CUA test
        env:
          AZURE_CUA_API_KEY: ${{ secrets.AZURE_CUA_API_KEY }}
          AZURE_CUA_BASE_URL: ${{ secrets.AZURE_CUA_BASE_URL }}
          CUA_MODEL: gpt-5.4
          DISPLAY: ":99"
        run: |
          agentprobe run \
            --target browser \
            --case examples/open-weather.yaml \
            --output-dir /tmp/browser-cua-output

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-cua-output-${{ github.run_number }}
          path: /tmp/browser-cua-output/
          retention-days: 14
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-cua-output-demo-${{ github.run_number }}
          path: |
            /tmp/browser-cua-output/demo.gif
            /tmp/browser-cua-output/recording.mp4
          retention-days: 30
          if-no-files-found: warn
